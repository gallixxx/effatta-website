<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Effatta per software house — Effatta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/logos/effatta-mark-blue.svg">
  <link rel="stylesheet" href="assets/colors_and_type.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: var(--surface-0);
      color: var(--fg-1);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior: smooth;
    }
    body { line-height: 1.5; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    a { color: inherit; }
    button, a { transition: filter var(--t-base) var(--ease-out); }
    button:hover, a:hover { filter: brightness(0.97); }
    button:active, a:active { transform: scale(0.985); }
    section { position: relative; }
    :focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
</style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/atoms.jsx"></script>
  <script type="text/babel" src="components/NavBar.jsx"></script>
  <script type="text/babel" src="components/SoftwareHousePage.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      const [audience, setAudience] = React.useState("partner");
      return (
        <div>
          <NavBar audience={audience} setAudience={setAudience} />
          <SoftwareHousePage />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
