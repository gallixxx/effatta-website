name: Deploy su SiteGround

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          # Non sovrascrivere i file gestiti a runtime sul server e non
          # pubblicare materiali interni. Include i default git/node.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            docs/**
            data/status.json
            bot/config.php
            bot/state.json